<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

    <meta charset="UTF-8">
    <title>Dashboard | JobWarriors</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">

    <link rel="stylesheet"
          th:href="@{/webjars/font-awesome/css/all.css}">

    <link rel="stylesheet"
          th:href="@{/css/styles.css}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">

    <div class="container-fluid px-4">

        <a class="navbar-brand fw-bold"
           th:href="@{/dashboard/}">

            <i class="fa-solid fa-briefcase me-2"></i>

            JobWarriors

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarMenu">

            <ul class="navbar-nav mx-auto">

                <li class="nav-item">

                    <a class="nav-link"
                       sec:authorize="hasAuthority('Job Seeker')"
                       th:href="@{/dashboard/}">

                        <i class="fa fa-search me-1"></i>

                        Search Jobs

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       sec:authorize="hasAuthority('Job Seeker')"
                       th:href="@{/saved-jobs/}">

                        <i class="fa fa-bookmark me-1"></i>

                        Saved Jobs

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       sec:authorize="hasAuthority('Job Seeker')"
                       th:href="@{/job-seeker-profile/}">

                        <i class="fa fa-user me-1"></i>

                        Profile

                    </a>

                </li>

                <li class="nav-item"
                    sec:authorize="hasAuthority('Recruiter')">

                    <a class="nav-link"
                       th:href="@{/dashboard/add}">

                        <i class="fa fa-plus-circle me-1"></i>

                        Post Job

                    </a>

                </li>

            </ul>

            <div class="d-flex align-items-center">

                <img th:if="${user.photosImagePath!=null}"
                     th:src="@{${user.photosImagePath}}"
                     class="rounded-circle me-3"
                     width="45"
                     height="45">

                <span class="text-white fw-semibold me-3"
                      th:text="${user.firstName}">
                </span>

                <button class="btn btn-light logout-btn"
                        onclick="window.location.href='/logout'">
                    Logout
                </button>

            </div>

        </div>

    </div>

</nav>


<hr class="m-0">

<section class="section">

    <!-- Sidebar -->

    <aside class="sidenav">

        <h5 class="fw-bold mb-4">

            <i class="fa-solid fa-filter me-2"></i>

            Filters

        </h5>

        <form id="myForm"
              th:action="@{/dashboard/}"
              method="get">

            <label class="fw-semibold mt-3">

                Job Type

            </label>

            <div class="form-check mt-2">

                <input class="form-check-input"
                       type="checkbox"
                       name="fullTime"
                       th:checked="${fullTime}">

                <label class="form-check-label">

                    Full Time

                </label>

            </div>

            <div class="form-check">

                <input class="form-check-input"
                       type="checkbox"
                       name="partTime"
                       th:checked="${partTime}">

                <label class="form-check-label">

                    Part Time

                </label>

            </div>

            <div class="form-check">

                <input class="form-check-input"
                       type="checkbox"
                       name="internShip"
                       th:checked="${internShip}">

                <label class="form-check-label">

                    Internship

                </label>

            </div>

            <hr>

            <label class="fw-semibold">

                Work Mode

            </label>

            <div class="form-check mt-2">

                <input class="form-check-input"
                       type="checkbox"
                       name="remoteOnly"
                       th:checked="${remoteOnly}">

                <label class="form-check-label">

                    Remote

                </label>

            </div>

            <div class="form-check">

                <input class="form-check-input"
                       type="checkbox"
                       name="officeOnly"
                       th:checked="${officeOnly}">

                <label class="form-check-label">

                    Office

                </label>

            </div>

            <hr>

            <button class="btn btn-primary w-100 mt-4">
                <i class="fa-solid fa-filter me-2"></i>
                Apply Filters
            </button>

            <input type="hidden"
                   id="hidJob"
                   name="job"
                   th:value="${job}">

            <input type="hidden"
                   id="hidLoc"
                   name="location"
                   th:value="${location}">

        </form>

    </aside>

    <!-- Main -->

    <article>

        <div class="box">

            <h2 class="fw-bold">

                Welcome,

                <span th:text="${user.firstName}"></span>

                👋

            </h2>

            <p class="text-muted">

                Find your next opportunity faster.

            </p>

        </div>

        <div class="search-box">

            <div class="row g-3">

                <div class="col-md-5">

                    <input id="job"
                           class="form-control"
                           placeholder="Job Title"
                           name="job"
                           th:value="${job}">

                </div>

                <div class="col-md-5">

                    <input id="loc"
                           class="form-control"
                           placeholder="Location"
                           name="location"
                           th:value="${location}">

                </div>

                <div class="col-md-2">

                    <button class="btn btn-primary w-100">
                        <i class="fa fa-search me-2"></i>
                        Search
                    </button>

                </div>

            </div>

        </div>

        <div class="box">





                <h3 class="fw-bold mb-4"
                    sec:authorize="hasAuthority('Job Seeker')">

                    Latest Jobs

                </h3>

                <h3 class="fw-bold mb-4"
                    sec:authorize="hasAuthority('Recruiter')">

                    Your Posted Jobs

                </h3>


                <th:block th:each="jobPost : ${jobPost}">

                    <a th:href="@{/job-details-apply/{id}(id=${jobPost.jobPostId})}"
                       class="job-card-link">

                        <div class="job-card">

                            <!-- LEFT -->

                            <div class="job-left">

                                <div class="company-logo">

                                    <i class="fa-solid fa-building"></i>

                                </div>

                                <div class="job-content">

                                    <h3 class="job-title"
                                        th:text="${jobPost.jobTitle}">
                                    </h3>

                                    <p class="company-name"
                                       th:text="${jobPost.jobCompanyId.name}">
                                    </p>

                                    <div class="job-info">

                        <span>

                            <i class="fa-solid fa-location-dot"></i>

                            <span th:text="${jobPost.jobLocationId.city}"></span>,

                            <span th:text="${jobPost.jobLocationId.state}"></span>

                        </span>

                                        <span>

                            <i class="fa-solid fa-briefcase"></i>

                            <span th:text="${jobPost.jobType}"></span>

                        </span>

                                        <span>

                            <i class="fa-solid fa-house"></i>

                            <span th:text="${jobPost.remote}"></span>

                        </span>

                                    </div>

                                    <div class="mt-3">

                        <span class="salary-badge">

                            ₹ <span th:text="${jobPost.salary}"></span>

                        </span>

                                    </div>

                                </div>

                            </div>

                            <!-- RIGHT -->

                            <div class="job-right">

                                <small class="text-muted mb-3"
                                       th:text="${#dates.format(jobPost.postedDate,'dd MMM yyyy')}">
                                </small>

                                <span class="view-btn">

                    View Details →

                </span>

                                <div class="mt-3">

                                    <!-- Recruiter -->

                                    <span class="saved"
                                          sec:authorize="hasAuthority('Recruiter')">

        Recruiter View

    </span>

                                    <!-- Candidate -->

                                    <span class="applied"
                                          sec:authorize="hasAuthority('Job Seeker')"
                                          th:if="${jobPost.isActive}">

        ✓ Applied

    </span>

                                    <span class="saved"
                                          sec:authorize="hasAuthority('Job Seeker')"
                                          th:if="${jobPost.isSaved}">

        ★ Saved

    </span>

                                </div>

                            </div>

                        </div>

                    </a>

                </th:block>

            </div> <!-- box -->

    </article>

</section>

<script
        th:src="@{/webjars/jquery/jquery.min.js}">
</script>

<script
        th:src="@{/webjars/bootstrap/js/bootstrap.min.js}">
</script>

<script>

    document.getElementById("job").addEventListener("change",function(){

        document.getElementById("hidJob").value=this.value;

    });

    document.getElementById("loc").addEventListener("change",function(){

        document.getElementById("hidLoc").value=this.value;

    });

</script>

</body>

</html>
