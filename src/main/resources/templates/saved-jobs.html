<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Dashboard</title>
    <meta charset="utf-8"/>
    <meta http-equiv="x-ua-compatible" content="ie=edge"/>
    <meta name="description" content=""/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>

    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/styles.css}"/>
    <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css} "/>
    <link th:rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.css}"/>

</head>

<body>

<header class="navbar navbar-expand-lg navbar-dark">

    <div class="container-fluid px-5">

        <a class="navbar-brand fw-bold" th:href="@{/dashboard/}">
            JobWarriors
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav mx-auto">

                <li class="nav-item">

                    <a class="nav-link"
                       th:href="@{/dashboard/}">

                        <i class="fa fa-search"></i>

                        Search Jobs

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link active"
                       th:href="@{/saved-jobs/}">

                        <i class="fa fa-bookmark"></i>

                        Saved Jobs

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       th:href="@{/job-seeker-profile/}">

                        <i class="fa fa-user"></i>

                        Profile

                    </a>

                </li>

            </ul>

            <div class="d-flex align-items-center">

                <img
                        th:if="${user.photosImagePath!=null}"
                        th:src="@{${user.photosImagePath}}"
                        class="rounded-circle me-3"
                        width="45"
                        height="45">

                <span class="me-4 fw-semibold"
                      th:text="${user.firstName+' '+user.lastName}">
                </span>

                <a th:href="@{/logout}"
                   class="btn btn-outline-light">

                    Logout

                </a>

            </div>

        </div>

    </div>

</header>

<section class="section">

    <aside class="sidenav">

    </aside>

    <article>

        <div class="box">

            <h1 class="primary-title">

                ⭐ Saved Jobs

            </h1>

            <p class="text-muted">

                Jobs you saved for later.

            </p>

        </div>

        <div class="box mt-4">

            <label class="large-label">

                Saved Jobs

            </label>
            <th:block th:each="jobPost : ${jobPost}">

                <a th:href="@{/job-details-apply/{id}(id=${jobPost.jobPostId})}"
                   class="job-card-link">

                    <div class="job-card">

                        <!-- LEFT -->
                        <div class="job-left">

                            <div class="company-logo">
                                <i class="fa-solid fa-building"></i>
                            </div>

                            <div class="job-content">

                                <h3 class="job-title"
                                    th:text="${jobPost.jobTitle}">
                                </h3>

                                <p class="company-name"
                                   th:text="${jobPost.jobCompanyId.name}">
                                </p>

                                <div class="job-info">

                        <span>
                            <i class="fa-solid fa-location-dot"></i>

                            <span th:text="${jobPost.jobLocationId.city}"></span>,
                            <span th:text="${jobPost.jobLocationId.state}"></span>

                        </span>

                                    <span>

                            <i class="fa-solid fa-briefcase"></i>

                            <span th:text="${jobPost.jobType}"></span>

                        </span>

                                    <span>

                            <i class="fa-solid fa-house"></i>

                            <span th:text="${jobPost.remote}"></span>

                        </span>

                                </div>

                                <div class="mt-3">

                        <span class="salary-badge">

                            ₹ <span th:text="${jobPost.salary}"></span>

                        </span>

                                </div>

                            </div>

                        </div>

                        <!-- RIGHT -->

                        <div class="job-right">

                            <small class="text-muted"
                                   th:text="${#dates.format(jobPost.postedDate,'dd MMM yyyy')}">
                            </small>

                            <a th:href="@{/job-details-apply/{id}(id=${jobPost.jobPostId})}"
                               class="view-btn">
                                View Details →
                            </a>

                            <div>

                    <span class="applied"
                          th:if="${jobPost.isActive}">
                        ✓ Applied
                    </span>

                                <span class="saved"
                                      th:if="${jobPost.isSaved}">
                        ★ Saved
                    </span>

                            </div>

                        </div>

                    </div>

                </a>

            </th:block>
        </div> <!-- box -->

    </article>

</section>

<script
        type="text/javascript"
        th:src="@{/webjars/jquery/jquery.min.js}">
</script>

<script
        type="text/javascript"
        th:src="@{/webjars/popper.js/umd/popper.min.js}">
</script>

<script
        type="text/javascript"
        th:src="@{/webjars/bootstrap/js/bootstrap.min.js}">
</script>

<script
        type="text/javascript"
        th:src="@{/js/main.js}">
</script>

</body>
</html>
